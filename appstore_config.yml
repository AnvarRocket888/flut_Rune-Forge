# ─────────────────────────────────────────────────────────────────────────────
# appstore_config.yml — настройки App Store для этого проекта.
#
# Этот файл читается workflow .github/workflows/upload_metadata.yml
# на шаге "Write shared metadata".
#
# Что редактировать здесь:
#   - app_name, subtitle, keywords — отображаются в App Store
#   - support_url     — страница поддержки (обязательна)
#   - marketing_url   — сайт приложения (необязательна)
#   - privacy_url     — политика конфиденциальности (обязательна)
#
# Правила:
#   - Значения в двойных кавычках
#   - keywords: через запятую, без пробелов, не более 100 символов
#   - subtitle: не более 30 символов
#   - Без trailing slash в URL
# ─────────────────────────────────────────────────────────────────────────────

app_name:      "OveRune Forging"
subtitle:      "Record Sounds, Build a Tower"
keywords:      "sounddiary,audiojournal,voicememo,memories,recorder,soundmap,tower,vinyl,dailylog,journal"

support_url:   "https://overuneforging.com/support.html"
marketing_url: "https://overuneforging.com"
privacy_url:   "https://overuneforging.com/privacy-policy.html"
